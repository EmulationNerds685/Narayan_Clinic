<!doctype html>
<html lang="en-IN">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO: default OG tags (overridden by react-helmet-async per page) -->
    <meta property="og:site_name" content="Narayan Heart & Maternity Centre" />
    <meta property="og:image" content="https://narayanheartandmaternitycentre.com/nc.png" />
    <meta property="og:type" content="website" />

    <meta name="geo.region" content="IN-BR" />
